services:
  mysql:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/mysql:8.0.32
    container_name: bus-gallery-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bus_gallery}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "13306:3306"
    command:
      - --long_query_time=0.1
      - --slow_query_log=1
      - --log_queries_not_using_indexes=1
      - --slow_query_log_file=/var/lib/mysql/slow.log
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./init/trade_center.sql:/docker-entrypoint-initdb.d/trade_center.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-123456}" ]
      interval: 5s
      timeout: 5s
      retries: 1

  redis:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/quay.io/opstree/redis:v7.0.5
    container_name: bus-gallery-redis
    restart: always
    user: "0:0"
    command:
      [
        "redis-server",
        "/usr/local/etc/redis/redis.conf",
        "--requirepass", "${REDIS_PASSWORD:-12345678}",
        "--appendonly", "yes",
        "--save", "",
        "--stop-writes-on-bgsave-error", "no",
        "--dir", "/data"
      ]
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-12345678}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-data:/data

  minio:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/quay.io/minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: minio
    restart: always
    ports:
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-12345678}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  rabbitmq:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/rabbitmq:3.13.7-management
    container_name: bus-gallery-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: bus-gallery-nacos
    restart: always
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"

  backend:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      args:
        - MIRROR=aliyun
    image: bus-gallery-backend:latest
    container_name: bus-gallery-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL:-jdbc:mysql://mysql:3306/bus_gallery?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-12345678}
      MINIO_BUCKET: ${MINIO_BUCKET:-bus-gallery}
      MINIO_CDN_HOST: ${MINIO_CDN_HOST:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-12345678}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      AUTH_SESSION_TTL_SECONDS: 86400
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      AUTH_SECURITY_MAIL_ENABLED: ${AUTH_SECURITY_MAIL_ENABLED:-false}
      AUTH_SECURITY_MAIL_FROM: ${AUTH_SECURITY_MAIL_FROM:-}
      AUTH_SECURITY_CAPTCHA_ENABLED: ${AUTH_SECURITY_CAPTCHA_ENABLED:-true}
      AUTH_SECURITY_CAPTCHA_TTL_SECONDS: ${AUTH_SECURITY_CAPTCHA_TTL_SECONDS:-180}
      AUTH_SECURITY_CAPTCHA_CODE_LENGTH: ${AUTH_SECURITY_CAPTCHA_CODE_LENGTH:-4}
      AUTH_SECURITY_CAPTCHA_MAX_ATTEMPTS: ${AUTH_SECURITY_CAPTCHA_MAX_ATTEMPTS:-5}
      AUTH_SECURITY_LOGIN_CAPTCHA_FAILURE_THRESHOLD: ${AUTH_SECURITY_LOGIN_CAPTCHA_FAILURE_THRESHOLD:-5}
      AUTH_SECURITY_FORGOT_CAPTCHA_REQUEST_THRESHOLD: ${AUTH_SECURITY_FORGOT_CAPTCHA_REQUEST_THRESHOLD:-6}
      AUTH_RATE_SEND_CODE_IP_PER_DAY: ${AUTH_RATE_SEND_CODE_IP_PER_DAY:-200}
      AUTH_RATE_SEND_CODE_EMAIL_PER_DAY: ${AUTH_RATE_SEND_CODE_EMAIL_PER_DAY:-40}
      AUTH_RATE_SEND_CODE_ACCOUNT_PER_DAY: ${AUTH_RATE_SEND_CODE_ACCOUNT_PER_DAY:-40}
      UPLOAD_SECURITY_MAX_FILE_BYTES: ${UPLOAD_SECURITY_MAX_FILE_BYTES:-15728640}
      UPLOAD_SECURITY_MAX_IMAGE_WIDTH: ${UPLOAD_SECURITY_MAX_IMAGE_WIDTH:-8192}
      UPLOAD_SECURITY_MAX_IMAGE_HEIGHT: ${UPLOAD_SECURITY_MAX_IMAGE_HEIGHT:-8192}
      UPLOAD_SECURITY_MAX_IMAGE_PIXELS: ${UPLOAD_SECURITY_MAX_IMAGE_PIXELS:-24000000}
      UPLOAD_SECURITY_IP_PER_MINUTE: ${UPLOAD_SECURITY_IP_PER_MINUTE:-30}
      UPLOAD_SECURITY_USER_PER_MINUTE: ${UPLOAD_SECURITY_USER_PER_MINUTE:-20}
      UPLOAD_SECURITY_GLOBAL_PER_MINUTE: ${UPLOAD_SECURITY_GLOBAL_PER_MINUTE:-300}
      UPLOAD_SECURITY_USER_PER_DAY: ${UPLOAD_SECURITY_USER_PER_DAY:-120}
      UPLOAD_SECURITY_PENDING_PER_USER_MAX: ${UPLOAD_SECURITY_PENDING_PER_USER_MAX:-30}
      UPLOAD_SECURITY_PENDING_GLOBAL_MAX: ${UPLOAD_SECURITY_PENDING_GLOBAL_MAX:-5000}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-DEBUG}
      LOG_LEVEL_WEB: ${LOG_LEVEL_WEB:-INFO}
      LOG_LEVEL_MYBATIS: ${LOG_LEVEL_MYBATIS:-DEBUG}
      LOG_MAX_FILE_SIZE: ${LOG_MAX_FILE_SIZE:-20MB}
      LOG_MAX_HISTORY: ${LOG_MAX_HISTORY:-14}
      LOG_TOTAL_SIZE_CAP: ${LOG_TOTAL_SIZE_CAP:-1GB}
      LOG_CLEAN_HISTORY_ON_START: ${LOG_CLEAN_HISTORY_ON_START:-false}
      LOG_PATTERN_CONSOLE: ${LOG_PATTERN_CONSOLE}
      LOG_PATTERN_FILE: ${LOG_PATTERN_FILE}
      AUTH_GATEWAY_TRUST_ONLY: ${AUTH_GATEWAY_TRUST_ONLY:-true}
      AUTH_GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_AUTH_SECRET:-change-me-gateway-secret}
      AUTH_GATEWAY_MAX_SKEW_SECONDS: ${AUTH_GATEWAY_MAX_SKEW_SECONDS:-120}
      AUTH_GATEWAY_INTERNAL_HEADER: ${AUTH_GATEWAY_INTERNAL_HEADER:-X-Internal-Auth}
      NACOS_DISCOVERY_ENABLED: ${NACOS_DISCOVERY_ENABLED:-true}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-public}
      NACOS_GROUP: ${NACOS_GROUP:-DEFAULT_GROUP}
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
    volumes:
      - ../log/backend:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"

  group:
    build:
      context: ../
      dockerfile: group/Dockerfile
    image: bus-gallery-group:latest
    container_name: bus-gallery-group
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      TRADE_DB_URL: ${TRADE_DB_URL:-jdbc:mysql://mysql:3306/trade_center?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
      TRADE_DB_USERNAME: ${TRADE_DB_USERNAME:-root}
      TRADE_DB_PASSWORD: ${TRADE_DB_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-12345678}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      GROUP_AUTH_SESSION_KEY_PREFIX: ${GROUP_AUTH_SESSION_KEY_PREFIX:-busgallery:sessions:}
      GROUP_TRADE_MQ_EXCHANGE: ${GROUP_TRADE_MQ_EXCHANGE:-group.trade.exchange}
      GROUP_TRADE_ORDER_LOCKED_ROUTING_KEY: ${GROUP_TRADE_ORDER_LOCKED_ROUTING_KEY:-trade.order.locked}
      GROUP_TRADE_ORDER_SETTLED_ROUTING_KEY: ${GROUP_TRADE_ORDER_SETTLED_ROUTING_KEY:-trade.order.settled}
      GROUP_TRADE_ORDER_REFUNDED_ROUTING_KEY: ${GROUP_TRADE_ORDER_REFUNDED_ROUTING_KEY:-trade.order.refunded}
      GROUP_TRADE_OUTBOX_RELAY_BATCH_SIZE: ${GROUP_TRADE_OUTBOX_RELAY_BATCH_SIZE:-100}
      GROUP_TRADE_OUTBOX_RELAY_DELAY_MS: ${GROUP_TRADE_OUTBOX_RELAY_DELAY_MS:-2000}
      GROUP_TRADE_OUTBOX_RETRY_DELAY_SECONDS: ${GROUP_TRADE_OUTBOX_RETRY_DELAY_SECONDS:-60}
      GROUP_AUTH_GATEWAY_TRUST_ONLY: ${GROUP_AUTH_GATEWAY_TRUST_ONLY:-true}
      GROUP_AUTH_GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_AUTH_SECRET:-change-me-gateway-secret}
      GROUP_AUTH_GATEWAY_MAX_SKEW_SECONDS: ${GROUP_AUTH_GATEWAY_MAX_SKEW_SECONDS:-120}
      GROUP_AUTH_GATEWAY_INTERNAL_HEADER: ${GROUP_AUTH_GATEWAY_INTERNAL_HEADER:-X-Internal-Auth}
      NACOS_DISCOVERY_ENABLED: ${NACOS_DISCOVERY_ENABLED:-true}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-public}
      NACOS_GROUP: ${NACOS_GROUP:-DEFAULT_GROUP}
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
      LOG_LEVEL_ROOT: ${GROUP_LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_APP: ${GROUP_LOG_LEVEL_APP:-DEBUG}
      LOG_MAX_FILE_SIZE: ${GROUP_LOG_MAX_FILE_SIZE:-20MB}
      LOG_MAX_HISTORY: ${GROUP_LOG_MAX_HISTORY:-14}
      LOG_TOTAL_SIZE_CAP: ${GROUP_LOG_TOTAL_SIZE_CAP:-1GB}
      LOG_CLEAN_HISTORY_ON_START: ${GROUP_LOG_CLEAN_HISTORY_ON_START:-false}
    volumes:
      - ../log/group:/app/logs

  bridge:
    build:
      context: ../
      dockerfile: bridge/Dockerfile
    image: bus-gallery-bridge:latest
    container_name: bus-gallery-bridge
    restart: always
    depends_on:
      - backend
      - group
      - nacos
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 8093
      BRIDGE_CONTENT_SERVICE_NAME: ${BRIDGE_CONTENT_SERVICE_NAME:-bus-gallery}
      BRIDGE_TRADE_SERVICE_NAME: ${BRIDGE_TRADE_SERVICE_NAME:-bus-gallery-group-buy}
      BRIDGE_CONTENT_SERVICE_BASE_URL: ${BRIDGE_CONTENT_SERVICE_BASE_URL:-http://bus-gallery}
      NACOS_DISCOVERY_ENABLED: ${NACOS_DISCOVERY_ENABLED:-true}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-public}
      NACOS_GROUP: ${NACOS_GROUP:-DEFAULT_GROUP}
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
      BRIDGE_GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_AUTH_SECRET:-change-me-gateway-secret}
      BRIDGE_GATEWAY_MAX_SKEW_SECONDS: ${BRIDGE_GATEWAY_MAX_SKEW_SECONDS:-120}
      BRIDGE_GATEWAY_INTERNAL_HEADER: ${BRIDGE_GATEWAY_INTERNAL_HEADER:-X-Internal-Auth}
      LOG_LEVEL_ROOT: ${BRIDGE_LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_APP: ${BRIDGE_LOG_LEVEL_APP:-DEBUG}
      LOG_MAX_FILE_SIZE: ${BRIDGE_LOG_MAX_FILE_SIZE:-20MB}
      LOG_MAX_HISTORY: ${BRIDGE_LOG_MAX_HISTORY:-14}
      LOG_TOTAL_SIZE_CAP: ${BRIDGE_LOG_TOTAL_SIZE_CAP:-1GB}
      LOG_CLEAN_HISTORY_ON_START: ${BRIDGE_LOG_CLEAN_HISTORY_ON_START:-false}
    volumes:
      - ../log/bridge:/app/logs

  gateway:
    build:
      context: ../
      dockerfile: gateway/Dockerfile
    image: bus-gallery-gateway:latest
    container_name: bus-gallery-gateway
    restart: always
    depends_on:
      - backend
      - group
      - bridge
      - redis
      - nacos
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 8094
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-12345678}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      NACOS_DISCOVERY_ENABLED: ${NACOS_DISCOVERY_ENABLED:-true}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-nacos:8848}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-public}
      NACOS_GROUP: ${NACOS_GROUP:-DEFAULT_GROUP}
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
      GATEWAY_AUTH_ENABLED: ${GATEWAY_AUTH_ENABLED:-true}
      GATEWAY_AUTH_SESSION_KEY_PREFIX: ${GATEWAY_AUTH_SESSION_KEY_PREFIX:-busgallery:sessions:}
      GATEWAY_INTERNAL_AUTH_SECRET: ${GATEWAY_INTERNAL_AUTH_SECRET:-change-me-gateway-secret}
      GATEWAY_INTERNAL_AUTH_HEADER: ${GATEWAY_INTERNAL_AUTH_HEADER:-X-Internal-Auth}
      LOG_LEVEL_ROOT: ${GATEWAY_LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_APP: ${GATEWAY_LOG_LEVEL_APP:-DEBUG}
      LOG_MAX_FILE_SIZE: ${GATEWAY_LOG_MAX_FILE_SIZE:-20MB}
      LOG_MAX_HISTORY: ${GATEWAY_LOG_MAX_HISTORY:-14}
      LOG_TOTAL_SIZE_CAP: ${GATEWAY_LOG_TOTAL_SIZE_CAP:-1GB}
      LOG_CLEAN_HISTORY_ON_START: ${GATEWAY_LOG_CLEAN_HISTORY_ON_START:-false}
    volumes:
      - ../log/gateway:/app/logs

  frontend:
    build:
      context: ../
      dockerfile: frontend/Dockerfile
      args:
        - MIRROR=aliyun
    container_name: bus-gallery-frontend
    restart: always
    depends_on:
      - gateway
    ports:
      - "80:80"

volumes:
  mysql-data:
  minio-data:
  redis-data:
  rabbitmq-data:
