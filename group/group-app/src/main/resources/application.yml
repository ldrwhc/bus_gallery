server:
  port: 8092

spring:
  application:
    name: bus-gallery-group-buy
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${TRADE_DB_URL:jdbc:mysql://localhost:3306/trade_center?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${TRADE_DB_USERNAME:root}
    password: ${TRADE_DB_PASSWORD:123456}
    hikari:
      maximum-pool-size: ${TRADE_DB_MAX_POOL_SIZE:20}
      minimum-idle: ${TRADE_DB_MIN_IDLE:5}
  sql:
    init:
      mode: always
      schema-locations: classpath:group-schema.sql
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:12345678}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5000}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        default-requeue-rejected: false

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.busgallery.groupbuy: ${LOG_LEVEL_APP:DEBUG}
  pattern:
    console: '${LOG_PATTERN_CONSOLE:%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n}'
    file: '${LOG_PATTERN_FILE:%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n}'
  file:
    name: ${LOG_FILE_NAME:/app/logs/group-${LOG_TIME:000000}.log}
  logback:
    rollingpolicy:
      max-file-size: ${LOG_MAX_FILE_SIZE:20MB}
      max-history: ${LOG_MAX_HISTORY:14}
      total-size-cap: ${LOG_TOTAL_SIZE_CAP:1GB}
      clean-history-on-start: ${LOG_CLEAN_HISTORY_ON_START:false}

group:
  auth:
    session-key-prefix: ${GROUP_AUTH_SESSION_KEY_PREFIX:busgallery:sessions:}
    gateway:
      trust-only: ${GROUP_AUTH_GATEWAY_TRUST_ONLY:true}
      internal-secret: ${GROUP_AUTH_GATEWAY_INTERNAL_SECRET:change-me-gateway-secret}
      max-skew-seconds: ${GROUP_AUTH_GATEWAY_MAX_SKEW_SECONDS:120}
      internal-auth-header: ${GROUP_AUTH_GATEWAY_INTERNAL_HEADER:X-Internal-Auth}
  trade:
    mq:
      exchange: ${GROUP_TRADE_MQ_EXCHANGE:group.trade.exchange}
      order-locked-routing-key: ${GROUP_TRADE_ORDER_LOCKED_ROUTING_KEY:trade.order.locked}
      order-settled-routing-key: ${GROUP_TRADE_ORDER_SETTLED_ROUTING_KEY:trade.order.settled}
      order-refunded-routing-key: ${GROUP_TRADE_ORDER_REFUNDED_ROUTING_KEY:trade.order.refunded}
    outbox:
      relay-batch-size: ${GROUP_TRADE_OUTBOX_RELAY_BATCH_SIZE:100}
      relay-delay-ms: ${GROUP_TRADE_OUTBOX_RELAY_DELAY_MS:2000}
      retry-delay-seconds: ${GROUP_TRADE_OUTBOX_RETRY_DELAY_SECONDS:60}
    team-timeout-check-delay-ms: ${GROUP_TRADE_TEAM_TIMEOUT_CHECK_DELAY_MS:30000}
