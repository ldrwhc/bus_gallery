server:
  port: ${SERVER_PORT:8094}

spring:
  application:
    name: bus-gallery-gateway
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:12345678}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5000}
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
    gateway:
      redis-rate-limiter:
        include-headers: false
      routes:
        - id: block-group-direct
          uri: no://op
          predicates:
            - Path=/api/v1/group/**
          filters:
            - SetStatus=404
        - id: bridge-route
          uri: lb://bus-gallery-bridge
          predicates:
            - Path=/api/bridge/**
        - id: auth-route
          uri: lb://bus-gallery
          predicates:
            - Path=/api/auth/**
        - id: content-route
          uri: lb://bus-gallery
          predicates:
            - Path=/api/**

gateway:
  auth:
    enabled: ${GATEWAY_AUTH_ENABLED:true}
    session-key-prefix: ${GATEWAY_AUTH_SESSION_KEY_PREFIX:busgallery:sessions:}
    internal-secret: ${GATEWAY_INTERNAL_AUTH_SECRET:change-me-gateway-secret}
    internal-auth-header: ${GATEWAY_INTERNAL_AUTH_HEADER:X-Internal-Auth}
    auth-required-paths:
      - /api/bridge/
    anonymous-paths:
      - /api/auth/

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.busgallery.gateway: ${LOG_LEVEL_APP:DEBUG}
  pattern:
    console: '${LOG_PATTERN_CONSOLE:%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n}'
    file: '${LOG_PATTERN_FILE:%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n}'
  file:
    name: ${LOG_FILE_NAME:/app/logs/gateway-${LOG_TIME:000000}.log}
  logback:
    rollingpolicy:
      max-file-size: ${LOG_MAX_FILE_SIZE:20MB}
      max-history: ${LOG_MAX_HISTORY:14}
      total-size-cap: ${LOG_TOTAL_SIZE_CAP:1GB}
      clean-history-on-start: ${LOG_CLEAN_HISTORY_ON_START:false}
