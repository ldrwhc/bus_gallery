server:
  port: 8080

spring:
  application:
    name: bus-gallery
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/bus_gallery?useSSL=false&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
  servlet:
    multipart:
      max-file-size: 20MB  # 单文件最大大小
      max-request-size: 20MB # 单次请求最大大小
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:12345678}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:10000}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:3000}
          timeout: ${MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:5000}
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.busgallery.busgallery.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}        # 后端内部访问地址
  bucket: bus-gallery
  access-key: admin
  secret-key: 12345678
  # 对外可访问的统一地址，例如 http://localhost/bus-gallery 或 https://your-domain.com/bus-gallery
  cdn-host: 

auth:
  session:
    ttl-seconds: ${AUTH_SESSION_TTL_SECONDS:86400}
  security:
    code-length: ${AUTH_SECURITY_CODE_LENGTH:6}
    otp-ttl-seconds: ${AUTH_SECURITY_OTP_TTL_SECONDS:300}
    otp-max-attempts: ${AUTH_SECURITY_OTP_MAX_ATTEMPTS:5}
    otp-resend-cooldown-seconds: ${AUTH_SECURITY_OTP_RESEND_COOLDOWN_SECONDS:60}
    reset-ticket-ttl-seconds: ${AUTH_SECURITY_RESET_TICKET_TTL_SECONDS:600}
    mail-enabled: ${AUTH_SECURITY_MAIL_ENABLED:false}
    mail-from: ${AUTH_SECURITY_MAIL_FROM:}
    rate-limit:
      auth-global-per-minute: ${AUTH_RATE_AUTH_GLOBAL_PER_MINUTE:1200}
      send-code-ip-per-minute: ${AUTH_RATE_SEND_CODE_IP_PER_MINUTE:30}
      send-code-email-per-hour: ${AUTH_RATE_SEND_CODE_EMAIL_PER_HOUR:12}
      register-ip-per-minute: ${AUTH_RATE_REGISTER_IP_PER_MINUTE:20}
      register-email-per-hour: ${AUTH_RATE_REGISTER_EMAIL_PER_HOUR:8}
      login-ip-per-minute: ${AUTH_RATE_LOGIN_IP_PER_MINUTE:120}
      login-user-per-minute: ${AUTH_RATE_LOGIN_USER_PER_MINUTE:30}
      forgot-ip-per-minute: ${AUTH_RATE_FORGOT_IP_PER_MINUTE:30}
      forgot-identifier-per-hour: ${AUTH_RATE_FORGOT_IDENTIFIER_PER_HOUR:15}

logging:
  level:
    root: INFO
    com.busgallery: DEBUG
    org.springframework.web: DEBUG
    org.mybatis: DEBUG

busgallery:
  metrics:
    slow-query-ms: 200
  cache:
    vehicles:
      page-ttl-seconds: 30
    favorites:
      summary-ttl-seconds: 30
      liked-ttl-seconds: 30
    comments:
      ttl-seconds: 30
