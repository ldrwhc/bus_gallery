server:
  port: 8080

spring:
  application:
    name: bus-gallery
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/bus_gallery?useSSL=false&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  servlet:
    multipart:
      max-file-size: 10MB  # 单文件最大大小
      max-request-size: 10MB # 单次请求最大大小
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.busgallery.busgallery.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

minio:
  endpoint: http://minio:9000        # 后端内部访问地址
  bucket: bus-gallery
  access-key: admin
  secret-key: 12345678
  # 对外可访问的统一地址，例如 http://localhost/bus-gallery 或 https://your-domain.com/bus-gallery
  cdn-host: http://localhost/bus-gallery

logging:
  level:
    root: INFO
    com.busgallery: DEBUG
    org.springframework.web: DEBUG
    org.mybatis: DEBUG