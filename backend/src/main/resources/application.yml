server:
  port: 8080

spring:
  application:
    name: bus-gallery
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/bus_gallery?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:12345678}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:10000}
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          multiplier: 2
          max-interval: 5000ms
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:3000}
          timeout: ${MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:5000}
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.busgallery.busgallery.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  bucket: ${MINIO_BUCKET:bus-gallery}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:12345678}
  cdn-host: ${MINIO_CDN_HOST:}

auth:
  session:
    ttl-seconds: ${AUTH_SESSION_TTL_SECONDS:86400}
  security:
    code-length: ${AUTH_SECURITY_CODE_LENGTH:6}
    otp-ttl-seconds: ${AUTH_SECURITY_OTP_TTL_SECONDS:300}
    otp-max-attempts: ${AUTH_SECURITY_OTP_MAX_ATTEMPTS:5}
    otp-resend-cooldown-seconds: ${AUTH_SECURITY_OTP_RESEND_COOLDOWN_SECONDS:60}
    reset-ticket-ttl-seconds: ${AUTH_SECURITY_RESET_TICKET_TTL_SECONDS:600}
    mail-enabled: ${AUTH_SECURITY_MAIL_ENABLED:false}
    mail-from: ${AUTH_SECURITY_MAIL_FROM:}
    captcha-enabled: ${AUTH_SECURITY_CAPTCHA_ENABLED:true}
    captcha-ttl-seconds: ${AUTH_SECURITY_CAPTCHA_TTL_SECONDS:180}
    captcha-code-length: ${AUTH_SECURITY_CAPTCHA_CODE_LENGTH:4}
    captcha-max-attempts: ${AUTH_SECURITY_CAPTCHA_MAX_ATTEMPTS:5}
    login-captcha-failure-threshold: ${AUTH_SECURITY_LOGIN_CAPTCHA_FAILURE_THRESHOLD:5}
    forgot-captcha-request-threshold: ${AUTH_SECURITY_FORGOT_CAPTCHA_REQUEST_THRESHOLD:6}
    rate-limit:
      auth-global-per-minute: ${AUTH_RATE_AUTH_GLOBAL_PER_MINUTE:1200}
      send-code-ip-per-minute: ${AUTH_RATE_SEND_CODE_IP_PER_MINUTE:30}
      send-code-email-per-hour: ${AUTH_RATE_SEND_CODE_EMAIL_PER_HOUR:12}
      send-code-ip-per-day: ${AUTH_RATE_SEND_CODE_IP_PER_DAY:200}
      send-code-email-per-day: ${AUTH_RATE_SEND_CODE_EMAIL_PER_DAY:40}
      send-code-account-per-day: ${AUTH_RATE_SEND_CODE_ACCOUNT_PER_DAY:40}
      register-ip-per-minute: ${AUTH_RATE_REGISTER_IP_PER_MINUTE:20}
      register-email-per-hour: ${AUTH_RATE_REGISTER_EMAIL_PER_HOUR:8}
      login-ip-per-minute: ${AUTH_RATE_LOGIN_IP_PER_MINUTE:120}
      login-user-per-minute: ${AUTH_RATE_LOGIN_USER_PER_MINUTE:30}
      forgot-ip-per-minute: ${AUTH_RATE_FORGOT_IP_PER_MINUTE:30}
      forgot-identifier-per-hour: ${AUTH_RATE_FORGOT_IDENTIFIER_PER_HOUR:15}

logging:
  level:
    root: INFO
    com.busgallery: DEBUG
    org.springframework.web: DEBUG
    org.mybatis: DEBUG

busgallery:
  events:
    exchange: ${BUSGALLERY_EVENTS_EXCHANGE:busgallery.events.exchange}
    dlx-exchange: ${BUSGALLERY_EVENTS_DLX_EXCHANGE:busgallery.events.dlx}
    comment-created-routing-key: ${BUSGALLERY_COMMENT_CREATED_ROUTING_KEY:comment.created}
    favorite-toggled-routing-key: ${BUSGALLERY_FAVORITE_TOGGLED_ROUTING_KEY:favorite.toggled}
  metrics:
    slow-query-ms: 200
  cache:
    vehicles:
      page-ttl-seconds: 30
    favorites:
      summary-ttl-seconds: 30
      liked-ttl-seconds: 30
    comments:
      ttl-seconds: 30
  upload-security:
    max-file-bytes: ${UPLOAD_SECURITY_MAX_FILE_BYTES:15728640}
    max-image-width: ${UPLOAD_SECURITY_MAX_IMAGE_WIDTH:8192}
    max-image-height: ${UPLOAD_SECURITY_MAX_IMAGE_HEIGHT:8192}
    max-image-pixels: ${UPLOAD_SECURITY_MAX_IMAGE_PIXELS:24000000}
    upload-ip-per-minute: ${UPLOAD_SECURITY_IP_PER_MINUTE:30}
    upload-user-per-minute: ${UPLOAD_SECURITY_USER_PER_MINUTE:20}
    upload-global-per-minute: ${UPLOAD_SECURITY_GLOBAL_PER_MINUTE:300}
    upload-user-per-day: ${UPLOAD_SECURITY_USER_PER_DAY:120}
    pending-per-user-max: ${UPLOAD_SECURITY_PENDING_PER_USER_MAX:30}
    pending-global-max: ${UPLOAD_SECURITY_PENDING_GLOBAL_MAX:5000}
    allowed-mime-types:
      - image/jpeg
      - image/png
  image-access:
    token-secret: ${IMAGE_ACCESS_TOKEN_SECRET:change-me-image-access-secret}
    full-ttl-seconds: ${IMAGE_ACCESS_FULL_TTL_SECONDS:7200}
    thumbnail-ttl-seconds: ${IMAGE_ACCESS_THUMBNAIL_TTL_SECONDS:21600}
    thumbnail-watermark-enabled: ${IMAGE_ACCESS_THUMBNAIL_WATERMARK_ENABLED:true}
    thumbnail-watermark-text: ${IMAGE_ACCESS_THUMBNAIL_WATERMARK_TEXT:BUS GALLERY}
    upload-watermark-enabled: ${IMAGE_ACCESS_UPLOAD_WATERMARK_ENABLED:true}
    upload-watermark-text: ${IMAGE_ACCESS_UPLOAD_WATERMARK_TEXT:BUS GALLERY}
    upload-jpeg-quality: ${IMAGE_ACCESS_UPLOAD_JPEG_QUALITY:0.8}
    upload-max-side: ${IMAGE_ACCESS_UPLOAD_MAX_SIDE:2560}
